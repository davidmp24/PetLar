<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLar - Sistema de Adoção</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Personalizado -->
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light">

    <div class="d-flex">
        <!-- Menu Lateral -->
        <nav class="bg-dark text-light vh-100 p-3" style="width: 250px; position: fixed;">
            <h2 class="text-center">PetLar</h2>
            <ul class="nav flex-column">
                <li class="nav-item"><a href="{{ url_for('dashboard') }}" class="nav-link text-light">Dashboard</a></li>
                <li class="nav-item"><a href="{{ url_for('cadastrar_animal') }}" class="nav-link text-light">Cadastrar Animal</a></li>
                <li class="nav-item"><a href="{{ url_for('listar_animais') }}" class="nav-link text-light">Listar Animais</a></li>
                <li class="nav-item"><a href="{{ url_for('logout') }}" class="nav-link text-danger">Sair</a></li>
            </ul>
        </nav>
        
        <!-- Conteúdo Principal -->
        <main class="flex-grow-1 p-4" style="margin-left: 250px; width: calc(100% - 250px);">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
